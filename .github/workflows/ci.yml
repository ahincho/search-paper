# =============================================================================
# LaTeX Article — Build PDF + Semantic Versioning
# =============================================================================
# CI: Compiles LaTeX on every push to main (validates document)
# Release: On tag v*.*.* → compile PDF + attach to GitHub Release
# =============================================================================

name: LaTeX Article

on:
  push:
    branches: [main]
    paths:
      - "**.tex"
      - "**.bib"
      - "figures/**"
      - ".github/workflows/ci.yml"
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # --- Job 1: Compile LaTeX document ---
  build:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_lualatex: false
          latexmk_shell_escape: false

      - name: Verify PDF output
        run: |
          if [ ! -f main.pdf ]; then
            echo "ERROR: main.pdf was not generated"
            exit 1
          fi
          echo "SUCCESS: main.pdf generated ($(du -h main.pdf | cut -f1))"

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: search-library-paper
          path: main.pdf
          retention-days: 30

  # --- Job 2: Create release with PDF (only on tags) ---
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: search-library-paper

      - name: Rename PDF with version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cp main.pdf "search-library-paper-v${VERSION}.pdf"
          echo "Renamed to: search-library-paper-v${VERSION}.pdf"

      - name: Create GitHub Release with PDF
        uses: softprops/action-gh-release@v2
        with:
          files: "search-library-paper-*.pdf"
          generate_release_notes: true
          body: |
            ## Search Library Paper — ${{ github.ref_name }}

            Artículo académico: **Algoritmo de Búsqueda A*: Implementación y Análisis Comparativo en Grafos y Matrices**

            ### Contenido
            - Fundamentación teórica del algoritmo A*
            - Análisis comparativo con BFS, DFS y Dijkstra
            - Implementación en Python con arquitectura extensible
            - Resultados experimentales en grafos y grids

            ### Descargar
            El PDF está adjunto como asset de este release.
